<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCK Skin Extractor</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#ffffff;
    color:#222;
}

header{
    padding:18px;
    text-align:center;
    font-size:20px;
    font-weight:600;
    border-bottom:1px solid #eee;
}

#dropZone{
    margin:20px;
    padding:40px 20px;
    text-align:center;
    border:2px dashed #ccc;
    border-radius:16px;
    background:#fafafa;
    transition:all .25s ease;
}

#dropZone:hover{
    background:#f0f6ff;
    border-color:#0078ff;
}

#fileInput{
    display:none;
}

#list{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:18px;
    padding:15px;
    text-align:center;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
    transition:.25s ease;
}

.card:active{
    transform:scale(.97);
}

.card img{
    width:100%;
    max-width:128px;
    height:auto;
    border-radius:12px;
    background:#fff;
}

.title{
    margin-top:10px;
    font-size:14px;
}

button{
    margin-top:10px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#0078ff;
    color:#fff;
    font-size:14px;
}

button:active{
    background:#005ecb;
}

#bottomBar{
    padding:20px;
}

#bottomBar button{
    font-size:16px;
    padding:14px;
}
</style>
</head>

<body>

<header>PCK Skin Extractor</header>

<div id="dropZone" onclick="document.getElementById('fileInput').click()">
    タップしてPCKを選択
</div>

<input type="file" id="fileInput" accept=".pck">

<div id="list"></div>

<div id="bottomBar">
    <button onclick="saveAll()">全部保存</button>
</div>

<script>

let skins = [];

document.getElementById("fileInput").addEventListener("change", async e=>{
    const file = e.target.files[0];
    if(!file) return;
    const buffer = await file.arrayBuffer();
    processPCK(buffer);
});

function processPCK(buffer){
    skins = [];
    document.getElementById("list").innerHTML = "";

    const bytes = new Uint8Array(buffer);
    const pngs = extractPNGs(bytes);

    for(let i=0;i<pngs.length;i++){
        skins.push({
            index:i+1,
            blob:new Blob([pngs[i]],{type:"image/png"})
        });
    }

    render();
}

function extractPNGs(bytes){
    const results=[];
    const header=[0x89,0x50,0x4E,0x47];
    const end=[0x49,0x45,0x4E,0x44,0xAE,0x42,0x60,0x82];

    for(let i=0;i<bytes.length-8;i++){
        if(match(bytes,i,header)){
            for(let j=i;j<bytes.length-8;j++){
                if(match(bytes,j,end)){
                    results.push(bytes.slice(i,j+8));
                    i=j+8;
                    break;
                }
            }
        }
    }
    return results;
}

function match(bytes,index,pattern){
    for(let i=0;i<pattern.length;i++){
        if(bytes[index+i]!==pattern[i]) return false;
    }
    return true;
}

function render(){
    const list=document.getElementById("list");
    list.innerHTML="";

    skins.forEach((skin,i)=>{
        const card=document.createElement("div");
        card.className="card";

        const img=document.createElement("img");
        img.src=URL.createObjectURL(skin.blob);

        const title=document.createElement("div");
        title.className="title";
        title.textContent="Data #"+skin.index;

        const btn=document.createElement("button");
        btn.textContent="保存";
        btn.onclick=()=>saveOne(i);

        card.appendChild(img);
        card.appendChild(title);
        card.appendChild(btn);

        list.appendChild(card);
    });
}

function saveOne(i){
    const skin=skins[i];
    const a=document.createElement("a");
    a.href=URL.createObjectURL(skin.blob);
    a.download="dlcskinSteal_"+skin.index+".png";
    a.click();
}

function saveAll(){
    skins.forEach((_,i)=>{
        setTimeout(()=>saveOne(i),i*120);
    });
}

</script>
<h3>PCKStudioを使わずにスキンやマントを抽出することができます。<br>
    スマホ、パソコン対応
    <br><br>
    最終更新日 2026/03/04 午前5:00
</h3>
</body>
</html>
